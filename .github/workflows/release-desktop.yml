name: Release Desktop Packages

on:
  workflow_dispatch:
    inputs:
      crystal_version:
        description: "Crystal 自身版本号，需为合法 semver。例如 1.0.0 或 1.0.0-rc"
        required: true
        type: string
      upstream_version:
        description: "对应的上游版本号，仅用于 Release 说明。例如 0.8.7"
        required: true
        type: string
      draft:
        description: "是否创建为草稿发布"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean
      target_ref:
        description: "可选。指定要发布的提交 SHA、分支名或 tag；留空则使用当前触发提交"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-desktop-packages-${{ github.ref }}-${{ inputs.crystal_version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      upstream_version: ${{ steps.meta.outputs.upstream_version }}
      release_version: ${{ steps.meta.outputs.release_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      target_ref: ${{ steps.meta.outputs.target_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          RELEASE_VERSION='${{ inputs.crystal_version }}'
          UPSTREAM_VERSION='${{ inputs.upstream_version }}'
          IS_PRERELEASE='${{ inputs.prerelease }}'

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "crystal_version must be a valid semver version" >&2
            exit 1
          fi

          if [[ ! "$UPSTREAM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "upstream_version must be a valid semver version" >&2
            exit 1
          fi

          if [[ "$IS_PRERELEASE" == "true" && "$RELEASE_VERSION" != *-* ]]; then
            echo "crystal_version must include a prerelease suffix such as -rc when prerelease=true" >&2
            exit 1
          fi

          if [[ "$IS_PRERELEASE" != "true" && "$RELEASE_VERSION" == *-* ]]; then
            echo "crystal_version must not include a prerelease suffix when prerelease=false" >&2
            exit 1
          fi

          RELEASE_TAG="v${RELEASE_VERSION}"
          RELEASE_TITLE="Crystal Agents ${RELEASE_VERSION}"
          TARGET_REF='${{ inputs.target_ref }}'
          if [[ -z "$TARGET_REF" ]]; then
            TARGET_REF="$GITHUB_SHA"
          fi

          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"

          echo "Upstream version: $UPSTREAM_VERSION"
          echo "Release version: $RELEASE_VERSION"
          echo "Release tag: $RELEASE_TAG"
          echo "Target ref: $TARGET_REF"

  build-windows-x64:
    name: Release Windows x64
    runs-on: windows-latest
    needs: prepare-release
    env:
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        shell: bash
        run: |
          node -e 'const fs=require("fs"); const path="apps/electron/package.json"; const pkg=JSON.parse(fs.readFileSync(path,"utf8")); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)+"\n");'
          echo "Building release version: $RELEASE_VERSION"

      - name: Build Windows x64 package
        working-directory: apps/electron
        run: bun run dist:win

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          if-no-files-found: error
          path: |
            apps/electron/release/*-${{ env.RELEASE_VERSION }}-x64.exe

  build-linux-x64:
    name: Release Linux x64
    runs-on: ubuntu-latest
    needs: prepare-release
    env:
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        shell: bash
        run: |
          node -e 'const fs=require("fs"); const path="apps/electron/package.json"; const pkg=JSON.parse(fs.readFileSync(path,"utf8")); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)+"\n");'
          echo "Building release version: $RELEASE_VERSION"

      - name: Build Linux x64 package
        working-directory: apps/electron
        run: bash scripts/build-linux.sh x64

      - name: Normalize Linux artifact name
        shell: bash
        run: |
          EXPECTED_PATH="apps/electron/release/Crystal-Agents-${RELEASE_VERSION}-x64.AppImage"
          ACTUAL_PATH=$(find apps/electron/release -maxdepth 1 -type f -name "*.AppImage" | head -n 1)

          if [[ -z "$ACTUAL_PATH" ]]; then
            echo "No AppImage artifact found" >&2
            exit 1
          fi

          if [[ "$ACTUAL_PATH" != "$EXPECTED_PATH" ]]; then
            echo "Renaming Linux artifact: $ACTUAL_PATH -> $EXPECTED_PATH"
            mv "$ACTUAL_PATH" "$EXPECTED_PATH"
          else
            echo "Linux artifact name already matches expected path"
          fi

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          if-no-files-found: error
          path: |
            apps/electron/release/Crystal-Agents-${{ env.RELEASE_VERSION }}-x64.AppImage

  build-macos:
    name: Release macOS
    runs-on: macos-latest
    needs: prepare-release
    env:
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        shell: bash
        run: |
          node -e 'const fs=require("fs"); const path="apps/electron/package.json"; const pkg=JSON.parse(fs.readFileSync(path,"utf8")); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)+"\n");'
          echo "Building release version: $RELEASE_VERSION"

      - name: Build macOS arm64 package
        working-directory: apps/electron
        shell: bash
        run: bash scripts/build-dmg.sh arm64 --no-sign

      - name: Build macOS x64 package
        working-directory: apps/electron
        shell: bash
        run: bash scripts/build-dmg.sh x64 --no-sign

      - name: Upload macOS arm64 dmg
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-dmg
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-arm64.dmg

      - name: Upload macOS arm64 zip
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-zip
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-arm64.zip

      - name: Upload macOS x64 dmg
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64-dmg
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-x64.dmg

      - name: Upload macOS x64 zip
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64-zip
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-x64.zip

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-windows-x64
      - build-linux-x64
      - build-macos
    env:
      GH_TOKEN: ${{ secrets.CRYSTAL_RELEASE_TOKEN }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
      RELEASE_TITLE: ${{ needs.prepare-release.outputs.release_title }}
      UPSTREAM_VERSION: ${{ needs.prepare-release.outputs.upstream_version }}
      TARGET_REF: ${{ needs.prepare-release.outputs.target_ref }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Show release assets
        shell: bash
        run: |
          echo "Release assets:"
          find release-assets -maxdepth 2 -type f | sort

      - name: Create or update draft release
        shell: bash
        run: |
          mapfile -t FILES < <(find release-assets -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' \) | sort)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release files found" >&2
            exit 1
          fi

          NOTES_FILE=$(mktemp)
          {
            echo "Based on upstream version: $UPSTREAM_VERSION"
            echo
            echo "Built from: $TARGET_REF"
          } > "$NOTES_FILE"

          EDIT_ARGS=(
            --title "$RELEASE_TITLE"
            --notes-file "$NOTES_FILE"
          )

          if [[ '${{ inputs.draft }}' == 'true' ]]; then
            EDIT_ARGS+=(--draft=true)
          else
            EDIT_ARGS+=(--draft=false)
          fi

          if [[ '${{ inputs.prerelease }}' == 'true' ]]; then
            EDIT_ARGS+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, updating metadata and uploading assets"
            gh release edit "$RELEASE_TAG" "${EDIT_ARGS[@]}" --repo "$GH_REPO"
            gh release upload "$RELEASE_TAG" "${FILES[@]}" --clobber --repo "$GH_REPO"
          else
            echo "Creating release $RELEASE_TAG"
            CREATE_ARGS=(
              --target "$TARGET_REF"
              --title "$RELEASE_TITLE"
              --notes-file "$NOTES_FILE"
              --generate-notes
            )

            if [[ '${{ inputs.draft }}' == 'true' ]]; then
              CREATE_ARGS+=(--draft)
            fi

            if [[ '${{ inputs.prerelease }}' == 'true' ]]; then
              CREATE_ARGS+=(--prerelease)
            fi

            gh release create "$RELEASE_TAG" "${FILES[@]}" "${CREATE_ARGS[@]}" --repo "$GH_REPO"
          fi
