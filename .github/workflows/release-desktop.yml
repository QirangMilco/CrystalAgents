name: Release Desktop Packages

on:
  workflow_dispatch:
    inputs:
      release_number:
        description: "版本序号。例如填 1：正式版会生成 0.8.7.1，预发布会生成 0.8.7-rc.1"
        required: true
        type: string
      draft:
        description: "是否创建为草稿发布"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean
      target_ref:
        description: "可选。指定要发布的提交 SHA、分支名或 tag；留空则使用当前触发提交"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-desktop-packages-${{ github.ref }}-${{ inputs.release_number }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.meta.outputs.base_version }}
      release_version: ${{ steps.meta.outputs.release_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      target_ref: ${{ steps.meta.outputs.target_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          RELEASE_NUMBER='${{ inputs.release_number }}'
          IS_PRERELEASE='${{ inputs.prerelease }}'
          if [[ ! "$RELEASE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "release_number must be a positive integer" >&2
            exit 1
          fi

          BASE_VERSION=$(node -p "require('./apps/electron/package.json').version")
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            RELEASE_VERSION="${BASE_VERSION}-rc.${RELEASE_NUMBER}"
          else
            RELEASE_VERSION="${BASE_VERSION}.${RELEASE_NUMBER}"
          fi
          RELEASE_TAG="v${RELEASE_VERSION}"
          RELEASE_TITLE="Crystal Agents ${RELEASE_VERSION}"
          TARGET_REF='${{ inputs.target_ref }}'
          if [[ -z "$TARGET_REF" ]]; then
            TARGET_REF="$GITHUB_SHA"
          fi

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"

          echo "Base version: $BASE_VERSION"
          echo "Release version: $RELEASE_VERSION"
          echo "Release tag: $RELEASE_TAG"
          echo "Target ref: $TARGET_REF"

  build-windows-x64:
    name: Release Windows x64
    runs-on: windows-latest
    needs: prepare-release
    env:
      CRYSTAL_RELEASE_NUMBER: ${{ inputs.release_number }}
      CRYSTAL_PRERELEASE: ${{ inputs.prerelease }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        shell: bash
        run: |
          if [[ "$CRYSTAL_PRERELEASE" == "true" ]]; then
            VERSION=$(bun run scripts/set-electron-version.ts prerelease)
          else
            VERSION=$(bun run scripts/set-electron-version.ts release)
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building release version: $VERSION"

      - name: Build Windows x64 package
        working-directory: apps/electron
        run: bun run dist:win

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          if-no-files-found: error
          path: |
            apps/electron/release/*-${{ env.RELEASE_VERSION }}-x64.exe
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

  build-linux-x64:
    name: Release Linux x64
    runs-on: ubuntu-latest
    needs: prepare-release
    env:
      CRYSTAL_RELEASE_NUMBER: ${{ inputs.release_number }}
      CRYSTAL_PRERELEASE: ${{ inputs.prerelease }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        shell: bash
        run: |
          if [[ "$CRYSTAL_PRERELEASE" == "true" ]]; then
            VERSION=$(bun run scripts/set-electron-version.ts prerelease)
          else
            VERSION=$(bun run scripts/set-electron-version.ts release)
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building release version: $VERSION"

      - name: Build Linux x64 package
        working-directory: apps/electron
        run: bash scripts/build-linux.sh x64

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          if-no-files-found: error
          path: |
            apps/electron/release/*-${{ env.RELEASE_VERSION }}-x64.AppImage
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

  build-macos:
    name: Release macOS
    runs-on: macos-latest
    needs: prepare-release
    env:
      CRYSTAL_RELEASE_NUMBER: ${{ inputs.release_number }}
      CRYSTAL_PRERELEASE: ${{ inputs.prerelease }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.target_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        shell: bash
        run: |
          if [[ "$CRYSTAL_PRERELEASE" == "true" ]]; then
            VERSION=$(bun run scripts/set-electron-version.ts prerelease)
          else
            VERSION=$(bun run scripts/set-electron-version.ts release)
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building release version: $VERSION"

      - name: Build macOS arm64 package
        working-directory: apps/electron
        shell: bash
        run: bash scripts/build-dmg.sh arm64 --no-sign

      - name: Build macOS x64 package
        working-directory: apps/electron
        shell: bash
        run: bash scripts/build-dmg.sh x64 --no-sign

      - name: Upload macOS arm64 dmg
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-dmg
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-arm64.dmg

      - name: Upload macOS arm64 zip
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64-zip
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-arm64.zip

      - name: Upload macOS x64 dmg
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64-dmg
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-x64.dmg

      - name: Upload macOS x64 zip
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64-zip
          if-no-files-found: error
          path: apps/electron/release/**/Crystal-Agents-${{ env.RELEASE_VERSION }}-x64.zip

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-windows-x64
      - build-linux-x64
      - build-macos
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
      RELEASE_TITLE: ${{ needs.prepare-release.outputs.release_title }}
      TARGET_REF: ${{ needs.prepare-release.outputs.target_ref }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Show release assets
        shell: bash
        run: |
          echo "Release assets:"
          find release-assets -maxdepth 2 -type f | sort

      - name: Create or update draft release
        shell: bash
        run: |
          mapfile -t FILES < <(find release-assets -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.yml' -o -name '*.blockmap' \) | sort)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release files found" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, uploading assets"
            gh release upload "$RELEASE_TAG" "${FILES[@]}" --clobber --repo "$GH_REPO"
          else
            echo "Creating release $RELEASE_TAG"
            CREATE_ARGS=(
              --target "$TARGET_REF"
              --title "$RELEASE_TITLE"
              --notes "Release $RELEASE_VERSION"
            )

            if [[ '${{ inputs.draft }}' == 'true' ]]; then
              CREATE_ARGS+=(--draft)
            fi

            if [[ '${{ inputs.prerelease }}' == 'true' ]]; then
              CREATE_ARGS+=(--prerelease)
            fi

            gh release create "$RELEASE_TAG" "${FILES[@]}" "${CREATE_ARGS[@]}" --repo "$GH_REPO"
          fi
