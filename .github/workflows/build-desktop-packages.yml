name: Build Desktop Packages

on:
  workflow_dispatch:

concurrency:
  group: build-desktop-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows x64 package
        working-directory: apps/electron
        run: bun run dist:win

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          if-no-files-found: error
          path: |
            apps/electron/release/*.exe
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux x64 package
        working-directory: apps/electron
        run: bash scripts/build-linux.sh x64

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64
          if-no-files-found: error
          path: |
            apps/electron/release/*.AppImage
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS arm64 package
        working-directory: apps/electron
        shell: bash
        run: bash scripts/build-dmg.sh arm64 --no-sign

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64
          if-no-files-found: error
          path: |
            apps/electron/release/**/Crystal-Agents-arm64.dmg
            apps/electron/release/**/Crystal-Agents-arm64.zip

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-x64
          if-no-files-found: error
          path: |
            apps/electron/release/**/Crystal-Agents-x64.dmg
            apps/electron/release/**/Crystal-Agents-x64.zip
