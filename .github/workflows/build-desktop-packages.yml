name: Build Desktop Packages

on:
  workflow_dispatch:

concurrency:
  group: build-desktop-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows x64 package
        working-directory: apps/electron
        run: bun run dist:win

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          if-no-files-found: error
          path: |
            apps/electron/release/*.exe
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux ${{ matrix.arch }} package
        working-directory: apps/electron
        run: bash scripts/build-linux.sh ${{ matrix.arch }}

      - name: Upload Linux ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            apps/electron/release/*.AppImage
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS ${{ matrix.arch }} package
        working-directory: apps/electron
        shell: bash
        run: bash scripts/build-dmg.sh "${{ matrix.arch }}" --no-sign

      - name: Upload macOS ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap
